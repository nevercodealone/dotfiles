# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Enable focus events so Vim detects pane switches for auto-reload
set -g focus-events on

set -g mouse on
# Copy command for tmux 3.2+ (handles all copy operations)
if-shell 'command -v wl-copy >/dev/null 2>&1' \
    'set -s copy-command "wl-copy -n"' \
    'set -s copy-command "xclip -selection clipboard"'

# Copy mouse selection to system clipboard (xclip for X11, wl-copy for Wayland)
if-shell 'command -v wl-copy >/dev/null 2>&1' \
    'bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy -n"' \
    'bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"'

# Key bindings for copy mode (y to copy line, Y to copy selection)
bind -T copy-mode-vi y send-keys -X copy-line
bind -T copy-mode-vi Y send-keys -X copy-selection
set -g history-limit 50000

# Session management
#   List sessions:    tmux ls
#   New session:      tmux new -s name
#   Attach session:   tmux attach -t name
#   Switch session:   Ctrl+b s
#   Detach:           Ctrl+b d
#   Delete session:   tmux kill-session -t name (permanently removes it)

# Splits inherit current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Full window horizontal split (new pane takes ALL available height)
bind _ split-window -f -v -c "#{pane_current_path}"

# Full window vertical split
bind '\' split-window -f -h -c "#{pane_current_path}"

# New window inherits working directory
bind c new-window -c "#{pane_current_path}"

# Show current working directory path in status bar at top
set -g status-position top
set -g status-right ' #{pane_current_path} '
set -g status-right-length 120

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
