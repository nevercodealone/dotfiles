# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session persistence
# tmux-resurrect: manual save/restore
#   Save:    Ctrl+b Ctrl+s
#   Restore: Ctrl+b Ctrl+r
set -g @plugin 'tmux-plugins/tmux-resurrect'
# Save/restore pane working directories and contents
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
# tmux-continuum: auto-saves every 20min, restores on tmux start
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '20'

# Auto-name new sessions after the current directory basename
set-hook -g session-created 'run-shell "tmux rename-session \"$(basename #{pane_current_path})\""'

set -g mouse on
set -g history-limit 50000

# Session management
#   List sessions:    tmux ls
#   New session:      tmux new -s name
#   Attach session:   tmux attach -t name
#   Switch session:   Ctrl+b s
#   Detach:           Ctrl+b d
#   Delete session:   tmux kill-session -t name (permanently removes it)

# Splits inherit current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Full window horizontal split (new pane takes ALL available height)
bind _ split-window -f -v -c "#{pane_current_path}"

# Full window vertical split
bind '\' split-window -f -h -c "#{pane_current_path}"

# New window inherits working directory
bind c new-window -c "#{pane_current_path}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
