# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Enable focus events so Vim detects pane switches for auto-reload
set -g focus-events on

set -g mouse on
# Copy command for tmux 3.2+ (X11; xclip required)
set -s copy-command "xclip -selection clipboard"

# Use vi key tables in copy mode so the copy-mode-vi bindings below are active.
set -g mode-keys vi

# Key bindings for copy mode (y to copy selection, Y to copy current line)
# Using copy-pipe-and-cancel so copy-command (xclip) receives the selection.
# Note: copy-selection-and-cancel does NOT invoke copy-command in tmux 3.x;
# only the copy-pipe* family does.
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi Y send-keys -X start-of-line \; send-keys -X begin-selection \; send-keys -X end-of-line \; send-keys -X copy-pipe-and-cancel
set -g history-limit 50000

# Session management
#   List sessions:    tmux ls
#   New session:      tmux new -s name
#   Attach session:   tmux attach -t name
#   Switch session:   Ctrl+b s
#   Detach:           Ctrl+b d
#   Delete session:   tmux kill-session -t name (permanently removes it)

# Splits inherit current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Full window horizontal split (new pane takes ALL available height)
bind _ split-window -f -v -c "#{pane_current_path}"

# Full window vertical split
bind '\' split-window -f -h -c "#{pane_current_path}"

# New window inherits working directory
bind c new-window -c "#{pane_current_path}"

# Show current working directory path in status bar at top
set -g status-position top
set -g status-right ' #{pane_current_path} '
set -g status-right-length 120

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
